<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AJRM Marine Instruments</title>
    <link rel="stylesheet" href="./styles.css?v=0.5.2" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="eyebrow">Signal K</p>
          <h1>AJRM Marine Instruments</h1>
        </div>
        <div class="status">
          <span id="statusDot"></span>
          <span id="statusText">Connecting</span>
        </div>
      </header>

      <section class="instrument-grid marine-classic" aria-live="polite">
        <article id="depthInstrument" class="instrument gauge-card medium" data-band="offline">
          <div class="bezel">
            <div class="brand">Depth</div>
            <div id="depthGauge" class="classic-gauge"></div>
          </div>
          <p id="depthSource" class="subtext">below keel</p>
        </article>

        <article id="windInstrument" class="instrument gauge-card wind-card wide" data-band="offline">
          <div class="bezel wind-bezel">
            <div class="brand garmin-style">Wind</div>
            <div class="classic-wind-panel">
              <div class="readout wind-lcd-card true-label wind-top-left">
                <strong id="trueWindDirection">--</strong>
                <span>TWD</span>
              </div>
              <div class="readout wind-lcd-card apparent-label right wind-top-right">
                <strong id="apparentWindAngle">--</strong>
                <span>AWA</span>
              </div>
              <div class="readout wind-lcd-card tide-label centre wind-top-centre">
                <strong id="tideDrift">--</strong>
                <span>drift kt</span>
              </div>
              <div class="wind-dial-wrap">
                <div class="needle-legend" aria-label="Wind needle legend">
                  <span class="legend-badge apparent-label">A</span>
                  <span class="legend-badge true-label">T</span>
                  <span class="legend-badge tide-label">C</span>
                </div>
                <div id="windGauge" class="classic-gauge wind-gauge"></div>
              </div>
              <div class="readout wind-lcd-card true-label wind-bottom-left">
                <strong id="trueWindSpeed">--</strong>
                <span>TWS kt</span>
              </div>
              <div class="readout wind-lcd-card tide-label centre wind-bottom-centre">
                <strong id="tideSetAngle">--</strong>
                <span>tide set</span>
              </div>
              <div class="readout wind-lcd-card apparent-label right wind-bottom-right">
                <strong id="trueWindAngle">--</strong>
                <span>TWA</span>
              </div>
            </div>
          </div>
          <p id="windDetail" class="subtext">--</p>
        </article>

        <article id="sogInstrument" class="instrument gauge-card" data-band="offline">
          <div class="bezel">
            <div class="brand">SOG</div>
            <div id="sogGauge" class="classic-gauge"></div>
          </div>
          <p class="subtext">Speed over ground</p>
        </article>

        <article id="cogInstrument" class="instrument gauge-card" data-band="offline">
          <div class="bezel">
            <div class="brand">COG</div>
            <div id="cogGauge" class="classic-gauge compass-gauge"></div>
          </div>
          <p class="subtext">Course over ground</p>
        </article>

        <article id="gpsInstrument" class="instrument gps-card" data-band="offline">
          <div class="bezel">
            <div class="brand">GPS</div>
            <div class="gps-panel">
              <div class="gps-fix">
                <span id="gpsFixLabel">No fix</span>
                <strong id="gpsAccuracy">--</strong>
                <small>accuracy</small>
              </div>
              <dl>
                <div>
                  <dt>Latitude</dt>
                  <dd id="gpsLatitude">--</dd>
                </div>
                <div>
                  <dt>Longitude</dt>
                  <dd id="gpsLongitude">--</dd>
                </div>
                <div>
                  <dt>Satellites</dt>
                  <dd id="gpsSatellites">--</dd>
                </div>
                <div>
                  <dt>HDOP / PDOP</dt>
                  <dd id="gpsDilution">--</dd>
                </div>
              </dl>
            </div>
          </div>
          <p class="subtext">Position and GNSS quality</p>
        </article>

        <article id="temperatureInstrument" class="instrument gauge-card" data-band="offline">
          <div class="bezel">
            <div class="brand">Exhaust</div>
            <div id="temperatureGauge" class="classic-gauge"></div>
          </div>
          <p class="subtext" aria-hidden="true"></p>
        </article>
      </section>
    </main>

    <script src="./app.js?v=0.5.2"></script>
  </body>
</html>
